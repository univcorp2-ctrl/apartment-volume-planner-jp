name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Typecheck and tests
        run: npm run check
      - name: Production build
        run: npm run build
      - name: Upload production bundle
        uses: actions/upload-artifact@v4
        with:
          name: apartment-volume-planner-dist
          path: dist
          if-no-files-found: error
